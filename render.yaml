services:
  - type: web
    name: arnoud-bex-portfolio
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: true
      - key: PORT
        value: 3000
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: portfolio-data
      mountPath: /data
      sizeGB: 5
