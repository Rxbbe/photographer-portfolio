<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerij</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="gallery">

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-logo" id="site-logo">Arnoud Bex</a>
      <div class="social-links"></div>
      <nav class="site-nav" id="site-nav"></nav>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="page-content">
    <div class="gallery-header">
      <h1 id="gallery-title">Galerij</h1>
      <p id="gallery-desc"></p>
      <a href="/" class="back-link">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Terug naar overzicht
      </a>
    </div>

    <div class="gallery-grid" id="gallery-grid">
      <div class="skeleton" style="height:300px;margin-bottom:12px"></div>
      <div class="skeleton" style="height:200px;margin-bottom:12px"></div>
      <div class="skeleton" style="height:350px;margin-bottom:12px"></div>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lb-close" aria-label="Sluiten">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
    <span class="lightbox-counter" id="lb-counter"></span>
    <div class="lightbox-img-wrap">
      <img id="lb-img" src="" alt="">
    </div>
    <button class="lightbox-btn lightbox-prev" id="lb-prev" aria-label="Vorige">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <button class="lightbox-btn lightbox-next" id="lb-next" aria-label="Volgende">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </button>
    <p class="lightbox-caption" id="lb-caption"></p>
  </div>

  <footer class="site-footer">
    <div class="footer-social"></div>
    <p class="footer-copy">&copy; <span id="footer-year"></span></p>
  </footer>

  <script src="/js/main.js"></script>
  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
</body>
</html>
